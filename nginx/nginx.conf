worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # ── Upstream to Spring Boot (internal, not exposed) ──
    upstream springboot {
        server 127.0.0.1:8080;
    }

    # ── HTTPS server (port 8443) — exposed as website ──
    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate /etc/nginx/ssl/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://springboot;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── phpMyAdmin reverse proxy (HTTPS) ──
        # Access via: https://<server-ip>:8443/phpmyadmin/
        location /phpmyadmin/ {
            proxy_pass http://phpmyadmin:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 8443;

            # phpMyAdmin needs these for redirects and asset loading
            proxy_redirect off;
            proxy_buffering off;

            # Increase timeouts for long SQL operations
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
