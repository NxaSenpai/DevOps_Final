<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html(content=~{::content}, title='Profile Form')}">
<body>
<div th:fragment="content">
    <h1 class="h3 mb-3" th:text="${profile.id} ? 'Edit Profile' : 'New Profile'">New Profile</h1>

    <div class="card">
        <div class="card-body">
            <form th:action="${profile.id} ? @{/profiles/{id}(id=${profile.id})} : @{/profiles}"
                  th:object="${profile}" method="post" class="row g-3">

                <!-- Profile Type -->
                <div class="col-md-4">
                    <label class="form-label">Profile Type *</label>
                    <select th:field="*{profileType}" class="form-select">
                        <option th:each="pt : ${profileTypes}" th:value="${pt}" th:text="${pt}">STUDENT</option>
                    </select>
                </div>

                <!-- Registration Number -->
                <div class="col-md-4">
                    <label class="form-label">Registration Number</label>
                    <input type="text" th:field="*{registrationNumber}" class="form-control"
                           placeholder="Auto-generated if empty">
                    <div class="form-text">Leave blank for auto-generation.</div>
                </div>

                <!-- Department -->
                <div class="col-md-4">
                    <label class="form-label">Department</label>
                    <input type="text" th:field="*{department}" class="form-control"
                           placeholder="e.g., Computer Science">
                </div>

                <!-- First Name -->
                <div class="col-md-6">
                    <label class="form-label">First Name *</label>
                    <input type="text" th:field="*{firstName}" class="form-control"
                           placeholder="First name" required>
                    <div th:if="${#fields.hasErrors('firstName')}" class="text-danger small"
                         th:errors="*{firstName}"></div>
                </div>

                <!-- Last Name -->
                <div class="col-md-6">
                    <label class="form-label">Last Name *</label>
                    <input type="text" th:field="*{lastName}" class="form-control"
                           placeholder="Last name" required>
                    <div th:if="${#fields.hasErrors('lastName')}" class="text-danger small"
                         th:errors="*{lastName}"></div>
                </div>

                <!-- Email -->
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control"
                           placeholder="email@example.com">
                    <div th:if="${#fields.hasErrors('email')}" class="text-danger small"
                         th:errors="*{email}"></div>
                </div>

                <!-- Phone -->
                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text" th:field="*{phone}" class="form-control"
                           placeholder="+1234567890">
                    <div th:if="${#fields.hasErrors('phone')}" class="text-danger small"
                         th:errors="*{phone}"></div>
                </div>

                <!-- Date of Birth -->
                <div class="col-md-6">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" th:field="*{dateOfBirth}" class="form-control">
                    <div th:if="${#fields.hasErrors('dateOfBirth')}" class="text-danger small"
                         th:errors="*{dateOfBirth}"></div>
                </div>

                <!-- Address -->
                <div class="col-12">
                    <label class="form-label">Address</label>
                    <input type="text" th:field="*{address}" class="form-control"
                           placeholder="123 Main Street, City">
                </div>

                <div class="col-12">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i>
                        <span th:text="${profile.id} ? 'Update' : 'Create'">Save</span>
                    </button>
                    <a th:href="@{/profiles}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
