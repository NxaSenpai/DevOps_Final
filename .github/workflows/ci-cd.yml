# ═══════════════════════════════════════════════════════════════
# GitHub Actions CI/CD — NxaSenpai ID Card Management
# Group: B  |  Name: TANG NAKRY
#
# Flow:
#   1. On every push → Checkout → Build → Test
#   2. On failure → email srengty@gmail.com + the developer who
#      committed the breaking change
#   3. On success → run Ansible playbook to deploy to Web Server
# ═══════════════════════════════════════════════════════════════

name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# ── Cancel in-progress runs on the same branch ──
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ═════════════════════════════════════════════════════════════
  # JOB 1 — Build & Test
  # ═════════════════════════════════════════════════════════════
  build-and-test:
    name: Build & Test (Java ${{ matrix.java-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ['21']

    steps:
      # ── Checkout source ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Set up JDK ──
      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin

      # ── Cache Gradle dependencies ──
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Make gradlew executable ──
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── Compile Java sources ──
      - name: Compile Java
        run: ./gradlew compileJava --no-daemon --console=plain

      # ── Run tests ──
      - name: Run tests
        id: test
        run: ./gradlew test --no-daemon --console=plain

      # ── Publish test results (always, even on failure) ──
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: JUnit Test Results
          path: build/test-results/test/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      # ── Upload test report as artifact (always) ──
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: build/reports/tests/
          retention-days: 7

      # ── Package JAR (only on success) ──
      - name: Package bootJar
        if: success()
        run: ./gradlew bootJar --no-daemon --console=plain

      # ── Upload JAR artifact ──
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: app-jar
          path: build/libs/*.jar
          retention-days: 7

    # ── Outputs forwarded to deploy job ──
    outputs:
      test_outcome: ${{ steps.test.outcome }}

  # ═════════════════════════════════════════════════════════════
  # JOB 2 — Deploy via Ansible (only if build-and-test succeeds)
  # ═════════════════════════════════════════════════════════════
  deploy:
    name: Deploy via Ansible
    runs-on: ubuntu-latest
    needs: build-and-test
    # ── Only deploy on push (not PR) ──
    if: needs.build-and-test.result == 'success' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Verify Ansible installation
        run: ansible --version

      - name: Run Ansible Playbook
        working-directory: ansible
        run: |
          ansible-playbook -i inventory.ini playbook.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          ANSIBLE_STDOUT_CALLBACK: default

  # ═════════════════════════════════════════════════════════════
  # JOB 3 — Notify on failure
  #   Runs when build-and-test fails.
  #   Emails srengty@gmail.com AND the developer who committed.
  # ═════════════════════════════════════════════════════════════
  notify-failure:
    name: Notify Build Failure
    runs-on: ubuntu-latest
    needs: build-and-test
    if: failure()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # enough to get committer info

      # ── Extract committer info ──
      - name: Extract committer details
        id: committer
        run: |
          COMMITTER_NAME=$(git log -1 --pretty=format:'%an')
          COMMITTER_EMAIL=$(git log -1 --pretty=format:'%ae')
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          COMMIT_SHA=$(git log -1 --pretty=format:'%H')
          echo "name=${COMMITTER_NAME}" >> $GITHUB_OUTPUT
          echo "email=${COMMITTER_EMAIL}" >> $GITHUB_OUTPUT
          echo "message=${COMMIT_MSG}" >> $GITHUB_OUTPUT
          echo "sha=${COMMIT_SHA}" >> $GITHUB_OUTPUT

          echo "Committer: ${COMMITTER_NAME} <${COMMITTER_EMAIL}>"
          echo "Commit:    ${COMMIT_MSG}"

      # ── Send failure email via SMTP ──
      #   Requires these secrets to be set in GitHub repo:
      #     SMTP_SERVER   — e.g. smtp.gmail.com
      #     SMTP_PORT     — e.g. 587
      #     SMTP_USERNAME — SMTP auth username
      #     SMTP_PASSWORD — SMTP auth password / app password
      - name: Send failure email
        id: send-email
        continue-on-error: true
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ BUILD FAILED: ${{ github.repository }} [#${{ github.run_number }}]"
          to: |
            srengty@gmail.com,
            ${{ steps.committer.outputs.email }}
          from: CI Bot <${{ secrets.SMTP_USERNAME }}>
          priority: high
          body: |
            The build has FAILED.

            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              Repository:  ${{ github.repository }}
              Workflow:    ${{ github.workflow }}
              Run:         #${{ github.run_number }}
              Branch:      ${{ github.ref_name }}
              Committer:   ${{ steps.committer.outputs.name }} <${{ steps.committer.outputs.email }}>
              Commit:      ${{ steps.committer.outputs.message }}
              SHA:         ${{ steps.committer.outputs.sha }}
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

            Build & Test logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please review the build log and fix the issue.

      # ── Fallback — log notification if SMTP not configured ──
      - name: Fallback notification (SMTP not configured)
        if: always() && steps.send-email.outcome != 'success'
        run: |
          echo "⚠️  SMTP email was NOT sent (secrets missing or SMTP misconfigured)."
          echo "Set SMTP_SERVER, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD in repo secrets."
          echo ""
          echo "Would have emailed:"
          echo "  To: srengty@gmail.com"
          echo "  To: ${{ steps.committer.outputs.email }}"
          echo "  Subject: ❌ BUILD FAILED: ${{ github.repository }} [#${{ github.run_number }}]"
